name: PowerShell Profile CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Run Profile Verification Tests
      shell: powershell
      run: |
        # Run test runner script
        ./Scripts/test_profile.ps1
